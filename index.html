<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Church Finance Manager</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>



</head>

<body>

<h1>Church Finance Manager</h1>

<div id="loginBox">

    <h2>Church Finance Login</h2>

    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button onclick="login()">Login</button>

</div>

<div id="app" style="display:none;">

<div class="menu">

    <button onclick="dashboard()">Dashboard</button>
    <button onclick="loadMembers()">Members</button>
    <button onclick="loadBudget()">Budget</button>
    <button onclick="loadIncome()">Income</button>
    <button onclick="loadExpense()">Expense</button>
    <button onclick="loadReports()">Reports</button>
    <button onclick="exportCollectionsExcel()">Export Collections to Excel</button>
    <button onclick="generateMemberPDF()">Generate Tax Report</button>



</div>

<div id="content"></div>
</div>
<script defer src="firebase.js"></script>
<script defer src="app.js"></script>
<script src="auth.js"></script>

</body>
</html>
